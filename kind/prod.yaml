# Cluster kind para o ambiente prod (1 control-plane + 5 workers).
# UI do Argo CD é acessada via 'kubectl port-forward' (sem extraPortMappings
# para evitar conflito de porta entre os 3 clusters no mesmo host).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: gitops-prod
nodes:
  - role: control-plane
  - role: worker
  - role: worker
  - role: worker
  - role: worker
  - role: worker
