{{- /*
  Extra NodePort Services to expose Grafana and Prometheus on fixed ports.
  These are ADDITIVE: the chart's own ClusterIP services are left untouched.
  Selectors mirror the upstream services (verified via `helm template`).
*/ -}}
{{- if .Values.nodePorts.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: grafana-nodeport
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: gitops-nodeport
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: {{ .Values.nodePorts.grafana }}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-nodeport
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: gitops-nodeport
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: prometheus
    operator.prometheus.io/name: {{ (index .Values "kube-prometheus-stack").fullnameOverride }}-prometheus
  ports:
    - name: http-web
      protocol: TCP
      port: 9090
      targetPort: 9090
      nodePort: {{ .Values.nodePorts.prometheus }}
{{- end }}
