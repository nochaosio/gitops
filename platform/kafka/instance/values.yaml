cluster:
  name: kafka
  version: 3.9.0
  metadataVersion: "3.9-IV0"
  replicationFactor: 1
  minInsyncReplicas: 1
nodePool:
  name: dual-role
  replicas: 1
  storage:
    size: 10Gi
    class: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi

# Additive external (nodeport) listener for Kafka. bootstrap + one nodePort per
# broker (broker-N -> brokerNodePortBase + N).
external:
  enabled: true
  bootstrapNodePort: 30094
  brokerNodePortBase: 30095
