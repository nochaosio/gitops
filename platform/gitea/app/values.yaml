# Extra NodePort service for the Gitea HTTP UI (additive — does not change the
# chart's own gitea-http service).
nodePort:
  enabled: true
  http: 30300

gitea:
  replicaCount: 1
  # Use the chart's bundled stateful dependencies for a self-contained install.
  redis-cluster:
    enabled: false
  postgresql:
    enabled: false
  postgresql-ha:
    enabled: false
  valkey-cluster:
    enabled: false
  gitea:
    config:
      database:
        DB_TYPE: sqlite3
      session:
        PROVIDER: memory
      cache:
        ADAPTER: memory
      queue:
        TYPE: level
  persistence:
    enabled: true
    size: 5Gi
