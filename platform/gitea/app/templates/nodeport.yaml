{{- /*
  Extra NodePort Service to expose the Gitea HTTP UI on a fixed port.
  ADDITIVE: the chart's own `gitea-http` ClusterIP service is left untouched.
*/ -}}
{{- if .Values.nodePort.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: gitea-nodeport
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: gitops-nodeport
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: {{ .Values.nodePort.http }}
{{- end }}
