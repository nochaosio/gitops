{{- /*
  Extra NodePort Service to expose the OTel Collector's OTLP receivers on fixed
  ports. ADDITIVE: the operator-managed `<name>-collector` service is untouched.
  Selector matches the labels the OpenTelemetry Operator puts on collector pods.
*/ -}}
{{- if .Values.nodePort.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.collector.name }}-collector-nodeport
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: gitops-nodeport
spec:
  type: NodePort
  selector:
    app.kubernetes.io/component: opentelemetry-collector
    app.kubernetes.io/managed-by: opentelemetry-operator
    app.kubernetes.io/instance: {{ .Release.Namespace }}.{{ .Values.collector.name }}
  ports:
    - name: otlp-grpc
      protocol: TCP
      port: 4317
      targetPort: 4317
      nodePort: {{ .Values.nodePort.grpc }}
    - name: otlp-http
      protocol: TCP
      port: 4318
      targetPort: 4318
      nodePort: {{ .Values.nodePort.http }}
{{- end }}
