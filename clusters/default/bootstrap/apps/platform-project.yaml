apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-default
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Platform components for the default (env-agnostic) bootstrap
  sourceRepos:
    - https://github.com/nochaosio/gitops.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
