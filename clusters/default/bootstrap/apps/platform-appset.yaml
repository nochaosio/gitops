apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-default
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/nochaosio/gitops.git
        revision: HEAD
        files:
          - path: "platform/*/*/config.json"
  template:
    metadata:
      name: "default-{{ .name }}"
      labels:
        environment: default
        tool: "{{ .tool }}"
      annotations:
        argocd.argoproj.io/sync-wave: "{{ .syncWave }}"
    spec:
      project: platform-default
      source:
        repoURL: https://github.com/nochaosio/gitops.git
        targetRevision: HEAD
        path: "{{ .path.path }}"
        helm:
          releaseName: "{{ .name }}"
          # Caminho env-agnóstico: SOMENTE o values.yaml default (sem overlay).
          valueFiles:
            - values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 5m
